<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Galaxy Project</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1a002b, #000);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            animation: stars 60s linear infinite;
        }

        @keyframes stars {
            from { background-position: 0 0; }
            to { background-position: 10000px 10000px; }
        }

        .login-container {
            position: relative;
            background: rgba(30, 30, 60, 0.8);
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
            padding: 40px;
            width: 340px;
            z-index: 1;
            text-align: center;
        }

        h1 {
            font-size: 1.8em;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00ffff, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            background: #1a1a3d;
            color: #fff;
            font-size: 1em;
            transition: box-shadow 0.3s ease;
        }

        input:focus {
            box-shadow: 0 0 10px #8a2be2;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #00ffff, #8a2be2);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        input[type="submit"]:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #8a2be2, #00ffff);
        }

        .messages {
            color: #ff4d4d;
            margin-bottom: 15px;
        }

        /* Estilo para errores del form de Django */
        .errorlist {
            list-style: none;
            padding: 0;
            color: #ff4d4d;
            font-size: 0.85em;
            margin: 4px 0;
        }

        label {
            display: none;
        }

        a {
            color: #00ffff;
            text-decoration: none;
            font-size: 0.9em;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Registro Galaxy</h1>

        {% if error %}
            <div class="messages">
                <p>{{ error }}</p>
            </div>
        {% endif %}

        <form method="POST" id="registerForm">
            {% csrf_token %}
            {% for field in form %}
                {{ field.errors }}
                {{ field }}
            {% endfor %}
            <input type="submit" value="Registrarse">
        </form>

        <p><a href="{% url 'login' %}">¿Ya tienes cuenta? Inicia sesión aquí</a></p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const box = document.querySelector(".login-container");
            box.style.opacity = 0;
            setTimeout(() => {
                box.style.transition = "opacity 1.5s";
                box.style.opacity = 1;
            }, 100);

            // Poner placeholders a los inputs del form de Django
            const placeholders = {
                "id_username": "Usuario",
                "id_email": "Correo",
                "id_password": "Contraseña",
                "id_password1": "Contraseña",
                "id_password2": "Confirmar Contraseña",
                "id_galaxy_api_key": "API Key de Galaxy"
            };
            Object.entries(placeholders).forEach(([id, placeholder]) => {
                const el = document.getElementById(id);
                if (el) el.placeholder = placeholder;
            });
        });
    </script>
</body>
</html>
